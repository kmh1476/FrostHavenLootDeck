<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FH Loot Dashboard Pro</title>
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/loot/fh-loot-bw-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; 
            --text: #f8fafc; --gold: #fbbf24; --icon-bg: #f1f5f9; 
            --panel-bg: rgba(30, 41, 59, 0.7); --border: rgba(255,255,255,0.08);
        }
        body { 
            font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }
        .main-wrapper { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 20px; }
        
        header { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo { width: 300px; height: auto; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(56, 189, 248, 0.5)); }
        h2 { color: var(--accent); margin: 0; font-size: 24px; letter-spacing: -1px; font-weight: 300; }

        /* Setup Area */
        #setup-area { 
            background: var(--card-bg); padding: 40px; border-radius: 28px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid var(--border);
        }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .setup-title { color: white; font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: left; }
        
        /* Game Area - Dashboard Layout */
        #play-area { display: none; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: start; }

        /* Left Column */
        .display-panel { 
            background: var(--panel-bg); padding: 40px; border-radius: 28px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 25px;
            backdrop-filter: blur(15px);
        }
        .loot-card { 
            width: 260px; height: 360px; border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.9); background: #2d3748; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .loot-card img { width: 100%; height: 100%; object-fit: contain; }

        /* Right Column */
        .log-panel { display: flex; flex-direction: column; gap: 20px; }
        .player-box { 
            padding: 25px; background: var(--panel-bg); border-radius: 24px; 
            border-left: 8px solid var(--accent); border: 1px solid var(--border);
            transition: 0.2s;
        }
        .name-tag { font-weight: 800; color: var(--accent); font-size: 20px; margin-bottom: 15px; display: block; }
        .summary-container { display: flex; flex-wrap: wrap; gap: 15px; }

        /* Common Components */
        .icon-wrapper { background: var(--icon-bg); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .setup-icon { width: 24px; height: 24px; object-fit: contain; }
        .input-group { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .input-group:focus-within { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .setup-left { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 15px; }
        .max-info { font-size: 11px; color: #64748b; font-weight: 400; margin-left: 5px; }
        
        input { width: 60px; background: #334155; border: 2px solid var(--accent); color: white; border-radius: 10px; padding: 8px; text-align: center; font-size: 18px; font-weight: bold; outline: none; }
        
        .btn { width: 100%; padding: 22px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 22px; transition: 0.2s; letter-spacing: -0.5px; }
        .btn-draw { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; box-shadow: 0 8px 0 #0369a1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .btn-draw:active { transform: translateY(4px); box-shadow: 0 4px 0 #0369a1; }
        .btn-draw:disabled { opacity: 0.3; filter: grayscale(0.5); transform: translateY(4px); box-shadow: none; }
        
        .assign-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; visibility: hidden; }
        .btn-name { background: #475569; color: white; font-size: 18px; padding: 22px 5px; border-radius: 15px; box-shadow: 0 6px 0 #1e293b; }
        .btn-name:hover { background: var(--accent); color: #0f172a; text-shadow: none; }

        .log-item { background: var(--icon-bg); color: #0f172a; padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .log-icon { width: 22px; height: 22px; object-fit: contain; }

        @media (max-width: 1000px) {
            #play-area { grid-template-columns: 1fr; gap: 30px; }
            .loot-card { width: 200px; height: 280px; }
            .logo { width: 220px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/logos/fh-frosthaven-logo.png" class="logo" alt="Frosthaven Logo">
        <h2>LOOT DASHBOARD <span style="font-weight:200; font-size: 16px;">v1.0</span></h2>
    </header>

    <div id="setup-area">
        <div class="setup-title">1단계: 노획 덱 물량 설정</div>
        <div class="setup-grid" id="setup-inputs"></div>
        <button class="btn btn-draw" onclick="startGame()">INITIALIZE MASTER DECK</button>
    </div>

    <div id="play-area">
        <div class="display-panel">
            <div id="card-container"><div class="loot-card" id="current-card"></div></div>
            <p id="deck-info" style="font-weight: 700; color: #cbd5e1; margin: 0; font-size: 18px;">REMAINING CARDS: 0</p>
            
            <div style="width: 100%; max-width: 450px;">
                <button class="btn btn-draw" id="draw-btn" onclick="drawCard()">DRAW LOOT CARD</button>
                <div class="assign-grid" id="assign-area" style="margin-top: 25px;">
                    <button class="btn btn-name" onclick="assignTo('김명흠')">김명흠</button>
                    <button class="btn btn-name" onclick="assignTo('배현우')">배현우</button>
                    <button class="btn btn-name" onclick="assignTo('정태영')">정태영</button>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <div class="player-box" id="box-김명흠"><span class="name-tag">👤 김명흠</span><div id="log-김명흠" class="summary-container"></div></div>
            <div class="player-box" id="box-배현우"><span class="name-tag">👤 배현우</span><div id="log-배현우" class="summary-container"></div></div>
            <div class="player-box" id="box-정태영"><span class="name-tag">👤 정태영</span><div id="log-정태영" class="summary-container"></div></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#64748b; cursor:pointer; font-size:13px; align-self: flex-end; margin-top: 15px; text-decoration: underline;">Reset Scenario</button>
        </div>
    </div>
</div>

<script>
    let masterDeck = []; // 중복 없는 전체 카드 덱
    let currentResult = null;
    const logs = { "김명흠": {}, "배현우": {}, "정태영": {} };

    const baseUrl = "https://raw.githubusercontent.com/any2cards/worldhaven/master/images/loot-deck/frosthaven/";
    const iconBase = "https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/loot/";
    const backImg = baseUrl + "fh-loot-deck-back.png";

    // 규-울 마스터: 실제 카드 장수 제한 정의
    const itemConfig = {
        // 돈은 총 20장 (1코인 12장, 2코인 6장, 3코인 2장)
        "money": { label: "돈", icon: iconBase + "fh-money-bw-icon.png", sub: [
            {p:"fh-one-coin", s:1361, e:1372, v:1, max:12}, // 12장
            {p:"fh-two-coins", s:1373, e:1378, v:2, max:6}, // 6장
            {p:"fh-three-coins", s:1379, e:1380, v:3, max:2} // 2장
        ], max: 20 }, 
        "lumber": { label: "나무", icon: iconBase + "fh-lumber-bw-icon.png", p:"fh-lumber", s:1401, e:1408, max: 8, x2: 3 }, // 총 8장
        "metal": { label: "금속", icon: iconBase + "fh-metal-bw-icon.png", p:"fh-metal", s:1409, e:1416, max: 8, x2: 3 }, // 총 8장
        "hide": { label: "가죽", icon: iconBase + "fh-hide-bw-icon.png", p:"fh-hide", s:1393, e:1400, max: 8, x2: 3 }, // 총 8장
        "h1": { label: "화살덩굴", icon: iconBase + "fh-arrowvine-bw-icon.png", p:"fh-arrowvine", s:1381, e:1382, max: 2 }, // 총 2장
        "h2": { label: "도끼견과", icon: iconBase + "fh-axenut-bw-icon.png", p:"fh-axenut", s:1383, e:1384, max: 2 }, // 총 2장
        "h3": { label: "시체버섯", icon: iconBase + "fh-corpsecap-bw-icon.png", p:"fh-corpsecap", s:1385, e:1386, max: 2 }, // 총 2장
        "h4": { label: "화염열매", icon: iconBase + "fh-flamefruit-bw-icon.png", p:"fh-flamefruit", s:1387, e:1388, max: 2 }, // 총 2장
        "h5": { label: "바위뿌리", icon: iconBase + "fh-rockroot-bw-icon.png", p:"fh-rockroot", s:1389, e:1390, max: 2 }, // 총 2장
        "h6": { label: "눈엉겅퀴", icon: iconBase + "fh-snowthistle-bw-icon.png", p:"fh-snowthistle", s:1391, e:1392, max: 2 }, // 총 2장
        "item": { label: "랜덤 아이템", icon: iconBase + "fh-treasure-chest-item-bw-icon.png", p:"fh-random-item", s:1417, e:1417, max: 1 } // 총 1장
    };

    const setupInputs = document.getElementById('setup-inputs');
    Object.keys(itemConfig).forEach(id => {
        const conf = itemConfig[id];
        // 기본값 설정 (아이템 1개, 돈 10개, 나머지는 MAX값의 절반)
        const defVal = id === 'item' ? 1 : (id === 'money' ? 10 : Math.floor(conf.max/2));
        setupInputs.innerHTML += `
            <div class="input-group">
                <div class="setup-left">
                    <div class="icon-wrapper"><img src="${conf.icon}" class="setup-icon"></div>
                    ${conf.label} <span class="max-info">(Max: ${conf.max})</span>
                </div>
                <input type="number" id="in-${id}" value="${defVal}" min="0" max="${conf.max}">
            </div>`;
    });

    // 셔플 함수
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 규-울 마스터: 중복 없는 카드 구성 로직
    function buildMasterDeck() {
        masterDeck = [];
        
        Object.keys(itemConfig).forEach(id => {
            const conf = itemConfig[id];
            let count = parseInt(document.getElementById(`in-${id}`).value) || 0;
            // 입력값 제한 (0~MAX)
            count = Math.max(0, Math.min(count, conf.max)); 
            
            if (id === 'money') {
                // 돈은 하위 코인 카드들을 다 합친 후, 거기서 중복 없이 뽑음
                let moneySubCards = [];
                conf.sub.forEach(sub => {
                    for(let i=0; i<sub.max; i++) {
                        moneySubCards.push({ type:'money', img: `${sub.p}-${sub.s + i}.png`, amount: sub.v });
                    }
                });
                shuffle(moneySubCards);
                // 앞에서부터 count개만 마스터 덱에 넣음
                for(let i=0; i<count; i++) masterDeck.push(moneySubCards[i]);
                
            } else {
                // 나머지 자원: 정해진 이미지 번호 범위 내에서 중복 없이 count개 뽑음
                let cardNumbers = [];
                for(let i=0; i<conf.max; i++) cardNumbers.push(conf.s + i);
                shuffle(cardNumbers);
                
                for(let i=0; i<count; i++) {
                    const num = cardNumbers[i];
                    let amount = 1;
                    // x2 카드 로직 (앞 3장)
                    if (conf.x2 && (num - conf.s) < conf.x2) amount = 2;
                    masterDeck.push({ type: id, img: `${conf.p}-${num}.png`, amount: amount });
                }
            }
        });
        
        shuffle(masterDeck); // 최종 덱 셔플
    }

    function startGame() {
        buildMasterDeck();
        if (masterDeck.length === 0) return alert("덱을 구성하세요!");
        
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'grid';
        showCard(backImg);
        updateUI();
    }

    function showCard(src) { document.getElementById('current-card').innerHTML = `<img src="${src}">`; }

    function drawCard() {
        if (masterDeck.length === 0) return alert("덱이 비었습니다!");
        
        // 덱 맨 위에서 카드 하나 가져옴
        currentResult = masterDeck.pop();
        
        showCard(baseUrl + currentResult.img);
        document.getElementById('assign-area').style.visibility = 'visible';
        document.getElementById('draw-btn').disabled = true;
        updateUI();
    }

    function assignTo(name) {
        if(!currentResult) return;
        
        const { type, amount } = currentResult;
        logs[name][type] = (logs[name][type] || 0) + amount;
        
        const summaryCont = document.getElementById(`log-${name}`);
        summaryCont.innerHTML = "";
        
        // 규-울 마스터: 자원별 합산
        Object.entries(logs[name]).forEach(([t, count]) => {
            summaryCont.innerHTML += `<div class="log-item"><img src="${itemConfig[t].icon}" class="log-icon"> x${count}</div>`;
        });
        
        showCard(backImg);
        document.getElementById('assign-area').style.visibility = 'hidden';
        document.getElementById('draw-btn').disabled = false;
        currentResult = null; // 초기화
        updateUI();
    }

    function updateUI() { document.getElementById('deck-info').innerText = `REMAINING CARDS: ${masterDeck.length}`; }
</script>
</body>
</html>
