<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>프로스트헤이븐 노획 대시보드</title>
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/loot/fh-loot-bw-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; 
            --text: #f8fafc; --gold: #fbbf24; --icon-bg: #f1f5f9; 
            --panel-bg: rgba(30, 41, 59, 0.8); --border: rgba(255,255,255,0.1);
        }
        body { 
            font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }
        .main-wrapper { width: 100%; max-width: 1250px; display: flex; flex-direction: column; gap: 20px; }
        
        header { text-align: center; margin-bottom: 10px; }
        .logo { width: 280px; filter: drop-shadow(0 4px 10px rgba(56, 189, 248, 0.4)); }

        /* 설정 영역 */
        #setup-area { 
            background: var(--card-bg); padding: 35px; border-radius: 28px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid var(--border);
        }
        .setup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .setup-title { font-size: 20px; font-weight: 800; color: var(--accent); }
        .btn-reset-vals { background: #334155; color: #94a3b8; border: 1px solid #475569; padding: 8px 18px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .btn-reset-vals:hover { background: #ef4444; color: white; border-color: #ef4444; }

        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        /* 게임 화면 */
        #play-area { display: none; grid-template-columns: 1.1fr 1.1fr; gap: 30px; align-items: start; }

        /* 왼쪽 (카드 드로우) */
        .display-panel { 
            background: var(--panel-bg); padding: 40px; border-radius: 30px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 20px;
            backdrop-filter: blur(15px);
        }
        .loot-card { 
            width: 250px; height: 350px; border-radius: 20px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9); background: #2d3748; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        .loot-card img { width: 100%; height: 100%; object-fit: contain; }

        /* 오른쪽 (캐릭터 로그) */
        .log-panel { display: flex; flex-direction: column; gap: 15px; }
        .player-box { 
            position: relative; overflow: hidden; padding: 20px 20px 20px 110px; 
            background: var(--panel-bg); border-radius: 24px; border: 1px solid var(--border);
            min-height: 110px; display: flex; flex-direction: column; justify-content: center;
        }
        .hero-portrait { 
            position: absolute; left: -15px; top: 50%; transform: translateY(-50%);
            width: 120px; height: 120px; object-fit: cover; 
            mask-image: linear-gradient(to right, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 50%, transparent 100%);
            opacity: 0.6; pointer-events: none;
        }
        .name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; z-index: 2; }
        .hero-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 5px var(--accent)); }
        .name-tag { font-weight: 900; color: white; font-size: 22px; }
        .summary-container { display: flex; flex-wrap: wrap; gap: 8px; z-index: 2; }

        /* 컴포넌트 */
        .icon-wrapper { background: var(--icon-bg); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .setup-icon { width: 22px; height: 22px; }
        .input-group { background: rgba(255,255,255,0.06); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 55px; background: #0f172a; border: 2px solid var(--accent); color: white; border-radius: 10px; padding: 8px; text-align: center; font-weight: 900; font-size: 18px; }
        
        .btn { width: 100%; padding: 22px; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .btn-draw { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; box-shadow: 0 6px 0 #0369a1; }
        .btn-draw:active { transform: translateY(3px); box-shadow: 0 3px 0 #0369a1; }
        
        .assign-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; visibility: hidden; }
        .btn-name { background: #475569; color: white; font-size: 18px; padding: 20px 5px; border-radius: 15px; box-shadow: 0 5px 0 #1e293b; font-weight: 900; }
        .btn-name:hover { background: var(--accent); color: #0f172a; }

        .log-item { background: var(--icon-bg); color: #0f172a; padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 900; }
        .log-icon { width: 20px; height: 20px; }

        @media (max-width: 900px) {
            #play-area { grid-template-columns: 1fr; }
            .hero-portrait { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/logos/fh-frosthaven-logo.png" class="logo">
    </header>

    <div id="setup-area">
        <div class="setup-header">
            <span class="setup-title">노획물 수량 설정</span>
            <button class="btn-reset-vals" onclick="resetAllToZero()">전체 0으로 초기화</button>
        </div>
        <div class="setup-grid" id="setup-inputs"></div>
        <button class="btn btn-draw" onclick="startGame()">시나리오 시작</button>
    </div>

    <div id="play-area">
        <div class="display-panel">
            <div id="card-container"><div class="loot-card" id="current-card"></div></div>
            <p id="deck-info" style="font-weight: 900; color: #94a3b8; margin: 0; font-size: 20px;">남은 카드: 0</p>
            <div style="width: 100%; max-width: 450px;">
                <button class="btn btn-draw" id="draw-btn" onclick="drawCard()">카드 드로우</button>
                <div class="assign-grid" id="assign-area" style="margin-top: 20px;">
                    <button class="btn btn-name" onclick="assignTo('김명흠')">김명흠</button>
                    <button class="btn btn-name" onclick="assignTo('배현우')">배현우</button>
                    <button class="btn btn-name" onclick="assignTo('정태영')">정태영</button>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <div class="player-box">
                <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/characters/images/fh-geminate.png" class="hero-portrait">
                <div class="name-row">
                    <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/characters/fh-geminate-icon.png" class="hero-icon">
                    <span class="name-tag">김명흠</span>
                </div>
                <div id="log-김명흠" class="summary-container"></div>
            </div>
            <div class="player-box">
                <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/characters/images/fh-banner-spear.png" class="hero-portrait">
                <div class="name-row">
                    <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/characters/fh-banner-spear-icon.png" class="hero-icon">
                    <span class="name-tag">배현우</span>
                </div>
                <div id="log-배현우" class="summary-container"></div>
            </div>
            <div class="player-box">
                <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/characters/images/fh-frozen-fist.png" class="hero-portrait">
                <div class="name-row">
                    <img src="https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/characters/fh-frozen-fist-icon.png" class="hero-icon">
                    <span class="name-tag">정태영</span>
                </div>
                <div id="log-정태영" class="summary-container"></div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#475569; cursor:pointer; font-size:14px; align-self: flex-end; text-decoration: underline; font-weight: 900;">다시 세팅하기</button>
        </div>
    </div>
</div>

<script>
    let masterDeck = [];
    let currentResult = null;
    const logs = { "김명흠": {}, "배현우": {}, "정태영": {} };

    const baseUrl = "https://raw.githubusercontent.com/any2cards/worldhaven/master/images/loot-deck/frosthaven/";
    const iconBase = "https://raw.githubusercontent.com/any2cards/worldhaven/master/images/art/frosthaven/icons/loot/";
    const backImg = baseUrl + "fh-loot-deck-back.png";

    const itemConfig = {
        "money": { label: "돈", icon: iconBase + "fh-money-bw-icon.png", sub: [{p:"fh-one-coin", s:1361, e:1372, v:1, max:12}, {p:"fh-two-coins", s:1373, e:1378, v:2, max:6}, {p:"fh-three-coins", s:1379, e:1380, v:3, max:2}], max: 20 }, 
        "lumber": { label: "나무", icon: iconBase + "fh-lumber-bw-icon.png", p:"fh-lumber", s:1401, e:1408, max: 8, x2: 3 },
        "metal": { label: "금속", icon: iconBase + "fh-metal-bw-icon.png", p:"fh-metal", s:1409, e:1416, max: 8, x2: 3 },
        "hide": { label: "가죽", icon: iconBase + "fh-hide-bw-icon.png", p:"fh-hide", s:1393, e:1400, max: 8, x2: 3 },
        "h1": { label: "화살덩굴", icon: iconBase + "fh-arrowvine-bw-icon.png", p:"fh-arrowvine", s:1381, e:1382, max: 2 },
        "h2": { label: "도끼견과", icon: iconBase + "fh-axenut-bw-icon.png", p:"fh-axenut", s:1383, e:1384, max: 2 },
        "h3": { label: "시체버섯", icon: iconBase + "fh-corpsecap-bw-icon.png", p:"fh-corpsecap", s:1385, e:1386, max: 2 },
        "h4": { label: "화염열매", icon: iconBase + "fh-flamefruit-bw-icon.png", p:"fh-flamefruit", s:1387, e:1388, max: 2 },
        "h5": { label: "바위뿌리", icon: iconBase + "fh-rockroot-bw-icon.png", p:"fh-rockroot", s:1389, e:1390, max: 2 },
        "h6": { label: "눈엉겅퀴", icon: iconBase + "fh-snowthistle-bw-icon.png", p:"fh-snowthistle", s:1391, e:1392, max: 2 },
        "item": { label: "아이템", icon: iconBase + "fh-treasure-chest-item-bw-icon.png", p:"fh-random-item", s:1417, e:1417, max: 1 }
    };

    function initInputs() {
        const setupInputs = document.getElementById('setup-inputs');
        setupInputs.innerHTML = "";
        Object.keys(itemConfig).forEach(id => {
            const conf = itemConfig[id];
            setupInputs.innerHTML += `
                <div class="input-group">
                    <div class="setup-left">
                        <div class="icon-wrapper"><img src="${conf.icon}" class="setup-icon"></div>
                        <span style="font-size:16px;">${conf.label}</span>
                    </div>
                    <input type="number" id="in-${id}" value="0" min="0" max="${conf.max}">
                </div>`;
        });
    }

    function resetAllToZero() {
        Object.keys(itemConfig).forEach(id => {
            document.getElementById(`in-${id}`).value = 0;
        });
    }

    function shuffle(a) { for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i], a[j]]=[a[j], a[i]]; } return a; }

    function startGame() {
        masterDeck = [];
        Object.keys(itemConfig).forEach(id => {
            const conf = itemConfig[id];
            let count = Math.min(parseInt(document.getElementById(`in-${id}`).value) || 0, conf.max);
            if (id === 'money') {
                let m = []; conf.sub.forEach(s => { for(let i=0; i<s.max; i++) m.push({type:'money', img: `${s.p}-${s.s+i}.png`, amount: s.v}); });
                shuffle(m); for(let i=0; i<count; i++) masterDeck.push(m[i]);
            } else {
                let nums = []; for(let i=0; i<conf.max; i++) nums.push(conf.s+i);
                shuffle(nums); for(let i=0; i<count; i++) {
                    const n = nums[i]; let amt = 1; if (conf.x2 && (n-conf.s) < conf.x2) amt = 2;
                    masterDeck.push({type:id, img:`${conf.p}-${n}.png`, amount:amt});
                }
            }
        });
        shuffle(masterDeck);
        if (masterDeck.length === 0) return alert("카드를 최소 한 장 이상 추가하세요!");
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'grid';
        showCard(backImg); updateUI();
    }

    function showCard(src) { document.getElementById('current-card').innerHTML = `<img src="${src}">`; }

    function drawCard() {
        if (masterDeck.length === 0) return alert("더 이상 카드가 없습니다!");
        currentResult = masterDeck.pop();
        showCard(baseUrl + currentResult.img);
        document.getElementById('assign-area').style.visibility = 'visible';
        document.getElementById('draw-btn').disabled = true;
        updateUI();
    }

    function assignTo(name) {
        if(!currentResult) return;
        const { type, amount } = currentResult;
        logs[name][type] = (logs[name][type] || 0) + amount;
        const cont = document.getElementById(`log-${name}`);
        cont.innerHTML = "";
        Object.entries(logs[name]).forEach(([t, c]) => {
            cont.innerHTML += `<div class="log-item"><img src="${itemConfig[t].icon}" class="log-icon"> x${c}</div>`;
        });
        showCard(backImg);
        document.getElementById('assign-area').style.visibility = 'hidden';
        document.getElementById('draw-btn').disabled = false;
        currentResult = null; updateUI();
    }

    function updateUI() { document.getElementById('deck-info').innerText = `남은 카드: ${masterDeck.length}`; }

    initInputs();
</script>
</body>
</html>
